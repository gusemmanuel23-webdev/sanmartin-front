<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller San Martín - Clientes</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-logo">Taller San Martín</div>
            <ul class="nav-links">
                <li><a href="index.html">Pizarra de Fosa</a></li>
                <li><a href="clientes.html" class="active">Clientes</a></li>
                <li><a href="vehiculos.html">Vehículos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
        <section class="card-formulario">
            <h2>Registrar Nuevo Cliente</h2>
            <form id="form-cliente">
                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Carlos Perez" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono de Contacto:</label>
                    <input type="text" id="telefono" name="telefono" placeholder="Ej: 1122334455">
                </div>
                <button type="submit" class="btn-guardar">Guardar Cliente</button>
            </form>
            <div id="mensaje-feedback" class="feedback"></div>
        </section>

        <section class="card-tabla">
            <h2>Listado de Clientes Registrados</h2>
            <div class="tabla-responsiva">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-clientes-body">
                        <tr>
                            <td colspan="4" class="text-center">Cargando clientes...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/clientes.js"></script>
</body>
</html>
