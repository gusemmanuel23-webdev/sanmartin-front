<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller San Martín - Vehículos</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-logo">Taller San Martín</div>
            <ul class="nav-links">
                <li><a href="index.html">Pizarra de Fosa</a></li>
                <li><a href="clientes.html">Clientes</a></li>
                <li><a href="vehiculos.html" class="active">Vehículos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        
        <section class="card-formulario">
            <h2>Registrar Nuevo Vehículo</h2>
            <form id="form-vehiculo">
                <div class="form-group">
                    <label for="patente">Patente / Dominio:</label>
                    <input type="text" id="patente" name="patente" placeholder="Ej: ABC 123" required>
                </div>
                <div class="form-group">
                    <label for="marca">Marca:</label>
                    <input type="text" id="marca" name="marca" placeholder="Ej: Ford" required>
                </div>
                <div class="form-group">
                    <label for="modelo">Modelo:</label>
                    <input type="text" id="modelo" name="modelo" placeholder="Ej: Fiesta" required>
                </div>
                <div class="form-group">
                    <label for="anio">Año de Fabricación:</label>
                    <input type="number" id="anio" name="anio" placeholder="Ej: 2018" min="1900" max="2027" required>
                </div>
                
                <div class="form-group">
                    <label for="cliente-select">Propietario / Cliente:</label>
                    <select id="cliente-select" name="clienteId" class="form-group input" style="width: 100%; background-color: var(--bg-principal); color: var(--texto-blanco); border: 1px solid var(--borde-sutil); padding: 10px; border-radius: 4px;" required>
                        <option value="">Cargando clientes disponibles...</option>
                    </select>
                </div>

                <button type="submit" class="btn-guardar">Guardar Vehículo</button>
            </form>
            <div id="mensaje-feedback" class="feedback"></div>
        </section>

        <section class="card-tabla">
            <h2>Flota de Vehículos en el Taller</h2>
            <div class="tabla-responsiva">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patente</th>
                            <th>Marca / Modelo</th>
                            <th>Año</th>
                            <th>Dueño</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-vehiculos-body">
                        <tr>
                            <td colspan="6" class="text-center">Cargando flota de vehículos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/vehiculos.js"></script>
</body>
</html>
